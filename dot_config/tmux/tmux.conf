# ====================
# Prefix key
# ====================
unbind-key C-b
set-option -g prefix C-t
bind-key C-t send-prefix

# ====================
# General
# ====================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -s escape-time 0
set -g history-limit 10000
set -g mouse on
set -g focus-events on
set -g set-titles on
set -g set-titles-string '#S'
setw -g mode-keys vi

# index offset
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ====================
# Key bindings
# ====================
# Pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation
bind -r C-p select-window -t :-
bind -r C-n select-window -t :+

# Pane resize
bind -r H resize-pane -L 2
bind -r L resize-pane -R 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2

# Quick switch
bind C-u last-window
bind C-i last-pane

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Copy mode (macOS)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Split with current path
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Manual save (resurrect)
bind S run-shell '#{@resurrect-save-script} quiet' \; display-message "Session saved."
# Manual restore (resurrect)
bind R run-shell '#{@resurrect-restore-script}' \; display-message "Session restored."
# Session list with fzf
bind s display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs -I{} tmux switch-client -t {}"

# ====================
# Session color theming
# ====================
set-hook -g session-created 'run-shell "~/.config/tmux/set-session-color.sh"'
set-hook -g client-session-changed 'run-shell "~/.config/tmux/set-session-color.sh"'

# ====================
# Status bar
# ====================
set -g status-position bottom
set -g status-interval 5

# Left: session name
set -g status-left-length 30
set -g status-left "#[bold] #S #[default]| "

# Right: color name + time
set -g status-right-length 60
set -g status-right " | #{@color_name} | %H:%M "

# Window list
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bold] #I:#W "
set -g window-status-separator ""

# ====================
# Pane/Message styles
# ====================
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour240
set -g message-style bg=colour235,fg=colour166
set -g display-panes-active-colour colour33
set -g display-panes-colour colour166

# ====================
# Clock
# ====================
setw -g clock-mode-colour colour64

# ====================
# Plugins
# ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# continuum settings
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Auto-save on structural changes (window/pane create/destroy)
set-hook -g session-created   'run-shell -b "#{@resurrect-save-script} quiet"'
set-hook -g session-closed    'run-shell -b "#{@resurrect-save-script} quiet"'
set-hook -g window-linked     'run-shell -b "#{@resurrect-save-script} quiet"'
set-hook -g window-unlinked   'run-shell -b "#{@resurrect-save-script} quiet"'

# ====================
# TPM bootstrap
# ====================
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
